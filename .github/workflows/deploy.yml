name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允許在 Actions 頁面手動觸發

# 授予 GITHUB_TOKEN 部署 Pages 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署；新的推送會等舊的跑完（不中斷進行中的部署）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        # 自動把 base 設成 /<repo>/，不必手改 vite.config.js。
        # 若你用自訂網域或 <user>.github.io 根 repo，改成 VITE_BASE=/
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback
        # GitHub Pages 沒有伺服器路由；複製一份 404.html 讓深層網址重新整理不會 404
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
